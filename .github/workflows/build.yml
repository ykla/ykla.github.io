name: 🔗 构建 pkgbase

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,9,17 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pkgbase
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - amd64
#          - aarch64
#          - riscv64

    steps:
      - name: 检出
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 初始化输出目录 (${{ matrix.target }})
        run: |
          mkdir -p pages-root

      - name: 在 FreeBSD VM 中构建 (${{ matrix.target }})
        uses: vmactions/freebsd-vm@v1.4.3
        with:
          release: "15.0"
          arch: x86_64
          sync-time: true
          mem: 8192
#          debug-on-error: true
          run: |
            ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
            date
            TARGET_ARCH=${{ matrix.target }}
            pkg update -f  # 注意，riscv 默认无 pkg 源
            pkg ins -y git 
            [ -d /usr/src ] || mkdir -p /usr/src && rm -rf /usr/src/*
            cd /usr/src
            git config --global advice.defaultBranchName false
            git clone --depth 1 --branch main https://git.freebsd.org/src.git /usr/src

            case "$TARGET_ARCH" in
              amd64)
                sed -i '' 's/^include "std.debug"/#include "std.debug"/' sys/amd64/conf/GENERIC || true
                ;;
              aarch64)
                sed -i '' 's/^include "std.debug"/#include "std.debug"/' sys/arm64/conf/std.arm64 || true
                ;;
              riscv64)
                sed -i '' 's/^include "std.debug"/#include "std.debug"/' sys/riscv/conf/GENERIC || true
                ;;
            esac

            make -s -j$(sysctl -n hw.ncpu) TARGET_ARCH=$TARGET_ARCH buildworld
            make -s -j$(sysctl -n hw.ncpu) TARGET_ARCH=$TARGET_ARCH buildkernel
            make -s -j$(sysctl -n hw.ncpu) TARGET_ARCH=$TARGET_ARCH packages        
            # 直接复制到 pages-root
            mkdir -p /home/runner/work/ykla.github.io/ykla.github.io/pages-root 
            for d in /usr/obj/usr/src/repo/FreeBSD:16:*; do mv "$d" "$(echo "$d" | sed 's/:/-/g')"; done
            cp -R /usr/obj/usr/src/repo/. /home/runner/work/ykla.github.io/ykla.github.io/pages-root/
            cd /usr/src
            TZ=Asia/Shanghai git log -1 --pretty=format:"哈希：%H%n作者：%an <%ae>%n提交者：%cn <%ce>%n提交时间：%cd%n提交信息：%n%n%B" --date=format-local:"%Y-%m-%d %H:%M:%S %z"  > /home/runner/work/ykla.github.io/ykla.github.io/pages-root/commit.txt
            ls -al /home/runner/work/ykla.github.io/ykla.github.io/pages-root/
            du -sh /home/runner/work/ykla.github.io/ykla.github.io/pages-root/
            
      - name: 上传中间构建产物 (${{ matrix.target }})
        uses: actions/upload-artifact@v7
        with:
          name: freebsd-${{ matrix.target }}
          path: pages-root/
          include-hidden-files: true

  pages:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有构建产物
        run: |
          mkdir -p pages-root
          
      - name: 下载 amd64 构建产物
        uses: actions/download-artifact@v8
        with:
          name: freebsd-amd64
          path: pages-root

#      - name: 下载 aarch64 构建产物
#        uses: actions/download-artifact@v8
#        with:
#          name: freebsd-aarch64
#          path: pages-root

#      - name: 下载 riscv64 构建产物
#        uses: actions/download-artifact@v8
#        with:
#          name: freebsd-riscv64
#          path: pages-root

      - name: 生成索引文件
        run: |
          export TZ=Asia/Shanghai
          pwd
          ls -al
          ls -al */*

          generate_index_recursive() {
          DIR="$1"
          REL_PATH="${2:-}"
          OUTPUT="$DIR/index.html"
          BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S')"

          {
          echo '<!DOCTYPE html>'
          echo '<html lang="zh-CN">'
          echo '<head>'
          echo '  <meta charset="UTF-8">'
          echo '  <meta name="viewport" content="width=device-width, initial-scale=1">'
          echo "  <title>Index of /${REL_PATH}</title>"
          echo '  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">'
          echo '  <style>'

          echo '  :root {'
          echo '    --primary:#111;'
          echo '    --bg:#f5f6f8;'
          echo '    --card:#ffffff;'
          echo '    --text:#222;'
          echo '    --sub:#666;'
          echo '    --border:#e5e7eb;'
          echo '    --shadow:0 4px 16px rgba(0,0,0,.06);'
          echo '  }'

          echo '  *{margin:0;padding:0;box-sizing:border-box;}'

          echo '  body{'
          echo '    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei UI","Microsoft YaHei","Noto Sans CJK SC",sans-serif;'
          echo '    background:var(--bg);'
          echo '    color:var(--text);'
          echo '    line-height:1.6;'
          echo '  }'

          echo '  .container{max-width:1200px;margin:auto;padding:20px;}'

          echo '  header{text-align:center;margin-bottom:30px;}'
          echo '  header h1{display:flex;align-items:center;justify-content:center;gap:12px;font-size:1.7rem;}'
          echo '  header .header-text{max-width:800px;text-align:left;margin:auto;margin-top:10px;color:var(--sub);line-height:1.5;}'

          echo '  h2{'
          echo '    margin-bottom:20px;'
          echo '    padding-bottom:10px;'
          echo '    border-bottom:1px solid var(--border);'
          echo '    overflow-x:auto;'
          echo '    white-space:nowrap;'
          echo '  }'

          echo '  .info-card{'
          echo '    background:var(--card);'
          echo '    padding:20px;'
          echo '    border-radius:14px;'
          echo '    box-shadow:var(--shadow);'
          echo '    margin-bottom:30px;'
          echo '  }'

          echo '  .commit-info{'
          echo '    background:linear-gradient(135deg,#1e293b,#0f172a);'
          echo '    color:#e2e8f0;'
          echo '    padding:16px;'
          echo '    border-radius:10px;'
          echo '    overflow-x:auto;'
          echo '    overflow-y:hidden;'
          echo '    white-space:pre;'
          echo '    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;'
          echo '    font-size:0.9rem;'
          echo '  }'

          echo '  .scrollable{overflow-x:auto; -webkit-overflow-scrolling: touch;}'

          echo '  table{'
          echo '    width:100%;'
          echo '    border-collapse:collapse;'
          echo '    background:#fff;'
          echo '    border-radius:10px;'
          echo '    box-shadow:0 2px 10px rgba(0,0,0,.04);'
          echo '  }'

          echo '  th,td{padding:12px;}'
          echo '  th{background:#f3f4f6;font-weight:600;}'
          echo '  tr:hover td{background:#f9fafb;}'

          echo '  footer{text-align:center;margin-top:40px;font-size:.9rem;color:#666;}'

          echo '  </style>'
          echo '</head>'
          echo '<body>'
          echo '<div class="container">'

          # Header
          echo '<header>'
          echo '<h1>'
          echo '  <img src="https://www.bsdcn.org/image/avatar.jpg" style="width:42px;height:42px;border-radius:8px;">'
          echo '  <span>FreeBSD 中文社区 pkgbase 镜像站</span>'
          echo '</h1>'
          echo '<div class="header-text">'
          echo '本站所有时间均为北京时间：每日凌晨 1 时、上午 9 时、傍晚 5 时拉取 freebsd-src 的 main 分支（CURRENT）进行构建。<br>'
          echo '本站 pkgbase 已移除调试选项 std.debug。本项目构建源代码：<a href="https://github.com/ykla/ykla.github.io" target="_blank">GitHub</a>'
          echo '</div>'
          echo '</header>'

          # commit 卡片
          echo '<div class="info-card">'
          echo '<h3>当前构建提交信息</h3>'
          echo '<div class="commit-info">'
          sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' /home/runner/work/ykla.github.io/ykla.github.io/pages-root/commit.txt \
          | sed -E 's|(https?://[^ ]+)|<a href="\1" target="_blank" style="color:#93c5fd;text-decoration:underline;">\1</a>|g; s|哈希：([0-9a-f]{7,40})|哈希：<a href="https://github.com/freebsd/freebsd-src/commit/\1" target="_blank" style="color:#93c5fd;text-decoration:underline;">\1</a>|g'
          echo '</div>'
          echo '</div>'

          # 文件表格
          echo '<div class="info-card">'
          echo '<div class="scrollable">'
          echo "<h2>Index of /${REL_PATH}</h2>"
          echo '<table>'
          echo '<tr><th>文件名</th><th>最后变动时间（UTC+8）</th><th>大小</th></tr>'

          if [ "$REL_PATH" != "" ]; then
            echo '<tr><td><a href="../index.html">../</a></td><td></td><td></td></tr>'
          fi

          for NAME in $(ls -1 "$DIR" | sort); do
            f="$DIR/$NAME"
            [[ "$NAME" = "index.html" || "$NAME" = "commit.txt" ]] && continue
            MTIME=$(date -r "$f" '+%Y-%m-%d %H:%M:%S')

            if [ -d "$f" ]; then
              SIZE=$(find "$f" -type f ! -name "index.html" ! -name "commit.txt" -exec du -k {} + 2>/dev/null \
                | awk '{sum+=$1} END {if(sum>=1048576)printf "%.2fG",sum/1048576; else if(sum>=1024)printf "%.2fM",sum/1024; else printf "%.2fK",sum}')
              [ -z "$SIZE" ] && SIZE="0K"
              echo "<tr><td><a href=\"$NAME/index.html\">$NAME/</a></td><td>$MTIME</td><td>$SIZE</td></tr>"
            else
              SIZE=$(du -sh "$f" | cut -f1)
              echo "<tr><td><a href=\"$NAME\">$NAME</a></td><td>$MTIME</td><td>$SIZE</td></tr>"
            fi
          done

          echo '</table>'
          echo '</div>'  # scrollable 容器结束
          echo '</div>'  # info-card 结束

          echo '<footer>'
          echo "<p>页面生成时间: $BUILD_TIME</p>"
          echo '<p>© FreeBSD 中文社区 2026</p>'
          echo '</footer>'

          echo '</div>'
          echo '</body>'
          echo '</html>'

          } > "$OUTPUT"

          for sub in "$DIR"/*/; do
            [ -d "$sub" ] || continue
            SUB_NAME=$(basename "$sub")
            SUB_REL_PATH="${REL_PATH}${SUB_NAME}/"
            generate_index_recursive "$sub" "$SUB_REL_PATH"
          done
          }
          generate_index_recursive "pages-root"
          
      - name: 上传 Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-root

#      - name: 复制 artifact 到服务器
#        uses: appleboy/scp-action@v1
#        with:
#          host: ${{ secrets.HOST }}
#          username: ${{ secrets.USERNAME }}
#          password: ${{ secrets.PASSWORD }}
#          port: ${{ secrets.PORT }}
#          source: pages-root/*
#          target: ${{ secrets.HTML }}
#          rm: true

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
